<!DOCTYPE html>
<html>
<head>
    <title>Church Attendance</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #007bff;
            color: white;
        }

        .success {
            color: green;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Church Attendance System</h1>

<div class="container">

    <!-- MARK ATTENDANCE -->
    <div class="card">
    <h2>Mark Attendance</h2>

    <label>Date:</label>
    <input type="date" id="date">

    <h3>Select Present Members</h3>
    <div id="membersList"></div>

    <button onclick="markAttendance()">Submit</button>

    <p class="success" id="msg"></p>
</div>

    <!-- ABSENTEES -->
    <div class="card">
        <h2>View Absentees</h2>

        <label>Date:</label>
        <input type="date" id="absDate">

        <button onclick="getAbsentees()">Load Absentees</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "login.html";
}
const API_URL = "http://127.0.0.1:8000";

// LOAD MEMBERS
async function loadMembers() {
    const res = await fetch(API_URL + "/members");
    const members = await res.json();

    const container = document.getElementById("membersList");
    container.innerHTML = "";

    members.forEach(member => {
        const div = document.createElement("div");

        div.innerHTML = `
            <label>
                <input type="checkbox" value="${member.id}">
                ${member.name}
            </label>
        `;

        container.appendChild(div);
    });
}

// MARK ATTENDANCE
async function markAttendance() {
    const date = document.getElementById("date").value;

    const checkboxes = document.querySelectorAll("#membersList input:checked");

    const selected = Array.from(checkboxes).map(cb => parseInt(cb.value));

const token = localStorage.getItem("token");

const res = await fetch(API_URL + "/attendance/mark", {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
        member_ids: selected,
        date: date
    })
});

    const data = await res.json();
    document.getElementById("msg").innerText = data.message;
}

// GET ABSENTEES (unchanged)
async function getAbsentees() {
    const date = document.getElementById("absDate").value;

    const token = localStorage.getItem("token");

    const res = await fetch(`${API_URL}/attendance/absentees?date=${date}`, {
    headers: {
        "Authorization": "Bearer " + token
    }
});
    const data = await res.json();

    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    data.absentees.forEach(user => {
        const row = `
            <tr>
                <td>${user.id}</td>
                <td>${user.name}</td>
                <td>${user.email}</td>
            </tr>
        `;
        table.innerHTML += row;
    });
}

// LOAD MEMBERS ON PAGE LOAD
loadMembers();
</script>

</body>
</html>
